<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Pro Cloud - V5</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
       :root {
            --bg-dark: #0A0E21;
            --card-grad: linear-gradient(120deg, #ed15cd, #063380);
            --orange: #FF7E5F;
            --white: #ffffff;
            --grey: #b0b0b0;
            --green: #28A745;
            --red: #dc3545;
  
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--white); padding-bottom: 80px; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #070a1a; display: flex; justify-content: space-around; padding: 12px; border-top: 3px solid #1ac7c4; z-index: 1000; }
        .nav-item { text-align: center; color: var(--grey); font-size: 18px; cursor: pointer; }
        .nav-item.active { color: var(--orange); font-weight: bold; }

        .container { padding: 15px; }

        /* Education Emoji Avatars */
        .av-box { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .av-circle { 
            min-width: 50px; height: 50px; border-radius: 50%; background: #ff21b1; 
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            cursor: pointer; border: 2px solid transparent; transition: 0.3s;
        }
        .av-circle.selected { border-color: var(--orange); background: var(--card-grad); transform: scale(1.1); }

        /* Student Cards */
      .record-card { 
            background: var(--card-grad); border-radius: 15px; padding: 15px; 
            margin-bottom: 12px; border-left: 4px solid var(--red); position: relative;
        }

        .status-paid { border-left-color: var(--green) !important; }
        .row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 15px; }
        .label { color: var(--grey); }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--bg-dark); padding: 20px; border-radius: 20px; border: 1px solid var(--orange); max-width: 450px; margin: auto; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #161b33; color: white; outline: none; }
        .btn { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .btn-full { width: 100%; margin-top: 10px; }
        .btn-edit { background: #007bff; }
        .btn-pay { background: var(--green); }
        .btn-msg { background: #25D366; }

      /* Button */
.receipt-btn {
    background: linear-gradient(45deg, #6c5ce7, #00cec9);
    color: #fff;
    font-size: 11px;
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* Hidden */
.hidden {
    display: none;
}

/* Main Receipt Box */
#receipt-print {
    background: #ffffff;
    color: #2d3436;
    padding: 20px;
    width: 200px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.15);
    font-family: 'Poppins', sans-serif;
    display: none;
}

/* Header (Top Left Logo + Title) */
.receipt-header {
    display: flex;
    align-items: center;
    gap: 10px;
}

.receipt-logo {
    font-size: 28px;
}

.receipt-title {
    font-size: 16px;
    font-weight: bold;
    color: #6c5ce7;
}

/* Divider Line */
.receipt-divider {
    height: 2px;
    background: linear-gradient(to right, #6c5ce7, #00cec9);
    margin: 8px 0;
    border-radius: 5px;
}

/* Compact Row (IMPORTANT FIX) */
.receipt-row {
    display: flex;
    align-items: center;
    gap: 5px;              /* 👈 label & value close */
    font-size: 13px;
    margin: 2px 0;         /* 👈 less vertical gap */
}

/* Label */
.receipt-label {
    font-weight: 600;
    min-width: 85px;       /* 👈 aligned & compact */
}

/* Value */
.receipt-value {
    color: #3e14e3;
    font-weight: 500;
}

/* QR Section */
#qr {
    display: flex;
    justify-content: center;
    margin: 10px 0;
}

/* Footer */
.receipt-footer {
    text-align: center;
    font-size: 12px;
    margin-top: 8px;
    color: #34343b;
}

  
   </style>
</head>
<body>

<header style="padding: 20px; background: #070a1a;">
    <h2 style="color: var(--orange);">Library Manage</h2>
</header>
  
<div class="container">
    <div id="home-tab" class="tab-content">
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px;">
            <div class="av-circle" style="flex-direction:column; background: #f5dd58; height:70px; width:auto; border-radius:12px; font-size:22px;" onclick="showTab('reg-tab')">📝<br>Reg</div>
            <div class="av-circle" style="flex-direction:column; background: #58f5e8; height:70px; width:auto; border-radius:12px; font-size:22px;" onclick="showTab('rec-tab')">📚<br>History</div>
            <div class="av-circle" style="flex-direction:column; background: #f53131; height:70px; width:auto; border-radius:12px; font-size:22px;" onclick="showTab('set-tab')">⚙️<br>Manage</div>
        </div>
        <div class="record-card status-paid">
            <h4>Live Stats</h4>
            <div class="row"><span>Total Students:</span> <span id="stat-total">0</span></div>
            <div class="row"><span>Active Seats:</span> <span id="stat-active">0</span></div>
        </div>
    </div>

    <div id="reg-tab" class="tab-content hidden">
        <h3>New Registration</h3>
        <p class="label">Choose Emoji Avatar</p>
        <div class="av-box" id="av-picker"></div>
        <form id="regForm">
            <input type="text" id="sName" placeholder="Student Name" required>
            <input type="text" id="fName" placeholder="Father Name" required>
            <input type="text" id="seatNo" placeholder="Seat Number" required>
            <input type="tel" id="mobile" placeholder="WhatsApp Number" required>
            <input type="email" id="email" placeholder="Gmail ID" required>
            <input type="date" id="admDate" required>
            <button type="submit" class="btn btn-pay btn-full">Submit to Cloud</button>
        </form>
    </div>

    <div id="rec-tab" class="tab-content hidden">
        <input type="text" placeholder="Search records..." onkeyup="search(this.value, 'rec-list')">
        <div id="rec-list"></div>
    </div>

    <div id="set-tab" class="tab-content hidden">
        <input type="text" placeholder="Search to edit..." onkeyup="search(this.value, 'set-list')">
        <div id="set-list"></div>
    </div>

    <div id="detail-tab" class="tab-content hidden">
        <button onclick="showTab('rec-tab')" class="btn" style="background:#444; margin-bottom:15px;">← Back</button>
        <div id="full-detail-ui"></div>
    </div>
</div>

<div id="successModal" class="modal">
    <div class="modal-content" style="text-align:center;">
        <h1 style="color:var(--green)">✓</h1>
        <h2>Registration Confirmed</h2>
        <div id="reg-success-info" style="margin:20px 0;"></div>
        <button onclick="closeModal('successModal')" class="btn btn-pay btn-full">Done</button>
    </div>
</div>

<div id="payModal" class="modal">
    <div class="modal-content">
        <h3>Collect Fee</h3>
        <div id="pay-header" style="margin-bottom:15px; border-bottom:1px solid #333"></div>
        <input type="number" id="pay-amt" placeholder="Amount (₹)">
        <select id="pay-operator">
            <option value="">Select Operator</option>
            <option value="Admin">Admin</option>
            <option value="Staff-1">Staff-1</option>
            <option value="Manager">Manager</option>
        </select>
        <button onclick="confirmPay()" class="btn btn-pay btn-full">Pay & Generate Receipt</button>
        <button onclick="closeModal('payModal')" class="btn btn-full" style="background:#444">Cancel</button>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Edit Student Details</h3>
        <div id="edit-form-box"></div>
        <button onclick="saveEdit()" class="btn btn-pay btn-full">Save Changes</button>
        <button onclick="closeModal('editModal')" class="btn btn-full" style="background:#444">Cancel</button>
    </div>
</div>

<div id="msgModal" class="modal">
    <div class="modal-content">
        <h3>Send Creative Alert</h3>
        <select id="msg-type" onchange="updateMsg()"><option value="0">Welcome</option><option value="1">Receipt</option><option value="2">Due Soon</option></select>
        <textarea id="msg-body" rows="6"></textarea>
        <button onclick="sendMsg('wa')" class="btn btn-msg btn-full">WhatsApp Alert</button>
        <button onclick="sendMsg('mail')" class="btn btn-full" style="background:#EA4335">Gmail Alert</button>
        <button onclick="closeModal('msgModal')" class="btn btn-full" style="background:#444">Close</button>
    </div>
</div>

    
 <div id="templateModal" class="modal">
    <div class="modal-content">
        <h3>Select Receipt Template</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
            <button onclick="setTemplate(1)" class="btn btn-edit">Standard (Blue)</button>
            <button onclick="setTemplate(2)" class="btn btn-pay">Modern (Green)</button>
            <button onclick="setTemplate(3)" class="btn" style="background:#6c5ce7;">Minimal (Purple)</button>
            <button onclick="setTemplate(4)" class="btn" style="background:#e84393;">Elegant (Pink)</button>
        </div>
        <button onclick="closeModal('templateModal')" class="btn btn-full" style="background:#444; margin-top:15px;">Cancel</button>
    </div>
</div>
   
<div id="receipt-print"></div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showTab('home-tab')">🏠<br>Home</div>
    <div class="nav-item" onclick="showTab('rec-tab')">📚<br>History</div>
    <div class="nav-item" onclick="showTab('set-tab')">⚙️<br>Manage</div>
</nav>

<script>
    // FIREBASE SETUP
        const firebaseConfig = {
  apiKey: "AIzaSyCuXFwrxRswCuyp7kvjNPF2Rnv2pIfcEAw",
  authDomain: "sba-academy-2006.firebaseapp.com",
  projectId: "sba-academy-2006",
  storageBucket: "sba-academy-2006.firebasestorage.app",
  messagingSenderId: "877157856362",
  appId: "1:877157856362:web:86c406e135e83682598613"
};
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let students = [];
    let currentId = null;
    let selAv = "🎓";

    // AVATARS
    
    const emojis = ["👨‍🎓","👧", "👨","👩", "👨‍🦱","👩‍🦰", "🧔‍","👩‍🦱", "👮","👮‍♀️", "👷‍♂️","👷‍♀️", "🕵️‍♂️", "👨‍⚕️", "👩‍⚕️","👨‍🎓", "👨‍🏫","👩‍🏫",];
 
        function initAvs() {
        const p = document.getElementById('av-picker');
        emojis.forEach(e => {
            const div = document.createElement('div');
            div.className = 'av-circle'; div.innerText = e;
            div.onclick = () => {
                document.querySelectorAll('.av-circle').forEach(c=>c.classList.remove('selected'));
                div.classList.add('selected'); selAv = e;
            };
            p.appendChild(div);
        });
        p.firstChild.classList.add('selected');
    }

    // SYNC
    db.ref('students').on('value', snap => {
        students = snap.val() ? Object.values(snap.val()) : [];
        updateStats(); renderRec(); renderSet();
    });

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    }
    function closeModal(id) { document.getElementById(id).style.display='none'; }

    // REGISTRATION
    document.getElementById('regForm').onsubmit = (e) => {
       

        e.preventDefault();
        const id = Math.floor(1000 + Math.random() * 9000);
        const data = {
            id, avatar: selAv,
            name: document.getElementById('sName').value,
            father: document.getElementById('fName').value,
            seat: document.getElementById('seatNo').value,
            mobile: document.getElementById('mobile').value,
            email: document.getElementById('email').value,
            admDate: document.getElementById('admDate').value,
            dueDate: 'Pending', status: 'Pending', payments: []
        };
        db.ref('students/'+id).set(data).then(()=>{
            document.getElementById('reg-success-info').innerHTML = `<h3>${data.name}</h3><p>Unique ID: <b>${id}</b></p>`;
            document.getElementById('successModal').style.display='block';
            e.target.reset();
        });
    };

    // HISTORY LIST (Only basic info as requested)
    function renderRec() {
        const list = document.getElementById('rec-list');
        list.innerHTML = '';
        students.forEach(s => {
            const isPaid = s.status === 'Completed';
            list.innerHTML += `
                <div class="record-card ${isPaid?'status-paid':''}" onclick="viewAllDetails(${s.id})">
                    <div class="row"><b>${s.name}</b> <small>ID: ${s.id}</small></div>
                    <div class="row"><span class="label">Father:</span> <span>${s.father}</span></div>
                    <div class="row"><span class="label">Seat:</span> <span>${s.seat}</span></div>
                    <div class="row"><span class="label">Due:</span> <span style="color:var(--orange)">${s.dueDate}</span></div>
                </div>`;
        });
    }

    // ALL DETAILS VIEW (When card clicked)
    function viewAllDetails(id) {
        const s = students.find(x => x.id === id);
        showTab('detail-tab');
        let payRows = s.payments ? s.payments.map((p, i) => `
            <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; margin-top:10px;">
                <div class="row"><b>₹${p.amount}</b> <span>${p.date}</span></div>
                <div class="row"><small>Op: ${p.op}</small> <button class="btn receipt-btn" onclick="openTemplateSelector(${s.id}, ${i})">Receipt</button></div>
<button class="btn receipt-btn" onclick="genPDF(${s.id}, ${i})">PDF</button>
<button class="btn" style="background:#ff7e5f; padding:6px 10px; font-size:11px; border-radius:6px;" onclick="shareReceiptImage(${s.id}, ${i})">Share Image 📱</button>

            </div>`).join('') : 'No payment history';

        document.getElementById('full-detail-ui').innerHTML = `
            <div class="record-card status-paid" style="border:none; text-align:center;">
                <div style="font-size:50px;">${s.avatar}</div>
                <h2 style="margin:10px 0;">${s.name}</h2>
                <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                <div class="row"><span class="label">Seat No:</span> <b>${s.seat}</b></div>
                <div class="row"><span class="label">Due Date:</span> <b style="color:var(--orange)">${s.dueDate}</b></div>
                <div class="row"><span class="label">Father:</span> <span>${s.father}</span></div>
                <div class="row"><span class="label">Gmail:</span> <span>${s.email}</span></div>
                <div class="row"><span class="label">Mobile:</span> <span>${s.mobile}</span></div>
                <div class="row"><span class="label">ID No:</span> <span>${s.id}</span></div>
                <div class="row"><span class="label">Admission:</span> <span>${s.admDate}</span></div>
                <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                <h4 style="text-align:left; color:var(--green)">Payment Record (Top)</h4>
                ${payRows}
            </div>`;
    }

    
    async function shareReceiptImage(sid, pIdx) {
    const s = students.find(x => x.id === sid);
    const p = s.payments[pIdx];
    if (!s || !p) return alert("Data not found!");

    const area = document.getElementById('receipt-print');
    
    // 1. Full Length UI Structure
    area.innerHTML = `
        <div id="capture-box" style="padding:25px; background:#ffffff; color:#333; width:280px; font-family:Arial, sans-serif; border-radius:0px;">
            <div style="text-align:center; border-bottom:3px double #6c5ce7; padding-bottom:15px; margin-bottom:15px;">
                <div style="font-size:35px;">📚</div>
                <h2 style="color:#6c5ce7; margin:5px 0; letter-spacing:1px;">DIGITAL LIBRARY</h2>
                <p style="font-size:10px; color:#666; margin:0;">STAY FOCUSED • ACHIEVE GOALS</p>
            </div>

            <div style="font-size:14px; line-height:2.0;">
                <div style="display:flex; justify-content:space-between;"><b>Id No:</b> <span>#LIB-${s.id}</span></div>
                <div style="display:flex; justify-content:space-between;"><b>Student:</b> <span>${s.name}</span></div>
                <div style="display:flex; justify-content:space-between;"><b>Seat No:</b> <span style="color:#e815bc; font-weight:bold;">${s.seat}</span></div>
                <div style="display:flex; justify-content:space-between;"><b>Father:</b> <span>${s.father}</span></div>
                <hr style="border:0; border-top:1px dashed #ccc; margin:10px 0;">
                <div style="display:flex; justify-content:space-between; font-size:18px; color:#28a745;"><b>Amount Paid:</b> <b>₹${p.amount}</b></div>
                <div style="display:flex; justify-content:space-between; font-size:12px; color:#28a745;"><b>op:</b> <b>${p.op}</b></div>
               
                <div style="display:flex; justify-content:space-between;"><b>Date:</b> <span>${p.date}</span></div>
                <div style="display:flex; justify-content:space-between;"><b>Valid From:</b> <span>${p.prevDue || 'N/A'}</span></div>
                <div style="display:flex; justify-content:space-between; color:#ff7e5f;"><b>Valid Till:</b> <b>${p.validTill}</b></div>
            </div>

            <div style="margin-top:20px; text-align:center;">
                <div id="qr-share" style="display:inline-block; padding:10px; background:#f9f9f9; border:1px solid #eee;"></div>
                <p style="font-size:11px; color:#888; margin-top:10px;">This is a computer-generated digital receipt.</p>
                <h4 style="margin-top:10px; color:#6c5ce7;">🙏 Thank You!</h4>
            </div>
        </div>`;

    // QR Code generation
    new QRCode(document.getElementById("qr-share"), { 
        text: `ID:${s.id} | Name:${s.name} | Till:${p.validTill}`, 
        width: 100, 
        height: 100 
    });

    // 2. CSS for Hidden Capture (Crucial for Full Length)
    area.style.display = 'block';
    area.style.position = 'absolute';
    area.style.top = '0';
    area.style.left = '-9999px';
    area.style.height = 'auto'; // Auto height for full content

    // Thoda wait karein rendering ke liye
    await new Promise(res => setTimeout(res, 400));

    try {
        const captureElement = document.getElementById('capture-box');
        
        // 3. Capture with Full Scroll Height
        const canvas = await html2canvas(captureElement, {
            scale: 3, // High quality
            useCORS: true,
            allowTaint: true,
            backgroundColor: "#ffffff",
            height: captureElement.scrollHeight, // Poori height capture karega
            width: captureElement.scrollWidth
        });

        const dataUrl = canvas.toDataURL("image/png");
        const blob = await (await fetch(dataUrl)).blob();
        const file = new File([blob], `Library_Receipt_${s.name}.png`, { type: "image/png" });

        const shareText = `*📚 Digital Library Receipt*\n\n✅ *Name:* ${s.name}\n🪑 *Seat:* ${s.seat}\n💰 *Paid:* ₹${p.amount}\n⏳ *Valid Till:* ${p.validTill}\n\n_Success starts with focus!_ 🚀`;

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
                files: [file],
                text: shareText
            });
        } else {
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = `Receipt_${s.name}.png`;
            link.click();
        }
    } catch (err) {
        console.error("Full Length Capture Error:", err);
        alert("Could not generate full image.");
    } finally {
        area.style.display = 'none';
    }
}


    // MANAGE LIST (With Edit & All Details)
    function renderSet() {
        const list = document.getElementById('set-list');
        list.innerHTML = '';
        students.forEach(s => {
            list.innerHTML += `
                <div class="record-card">
                    <div class="row"><b>${s.name} (Seat: ${s.seat})</b> <small>ID: ${s.id}</small></div>
                    <div class="row"><span class="label">Father:</span> <span>${s.father}</span></div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <button class="btn btn-pay" style="flex:1" onclick="openPay(${s.id})">Pay</button>
                        <button class="btn btn-edit" style="flex:1" onclick="openEdit(${s.id})">Edit</button>
                        <button class="btn btn-msg" style="flex:1" onclick="openMsg(${s.id})">Alert</button>
                        <button class="btn btn-danger" style="background:var(--red)" onclick="delS(${s.id})">Del</button>
                    </div>
                </div>`;
        });
    }

    // PAYMENT
    function openPay(id) {
        currentId = id; const s = students.find(x=>x.id===id);
        document.getElementById('pay-header').innerHTML = `<p>${s.name}</p><b>Seat: ${s.seat}</b> /Due date: ${s.dueDate}`;
        document.getElementById('payModal').style.display='block';
    }
   function confirmPay() {
    const amt = document.getElementById('pay-amt').value;
    const op = document.getElementById('pay-operator').value;
    if(!amt || !op) return alert("Fill all details");

    const s = students.find(x => x.id === currentId);
    
    // Purani date save karein
    const oldDue = s.dueDate; 

    // Nayi date calculate karein
    let d = (s.dueDate === 'Pending') ? new Date() : new Date(s.dueDate);
    d.setDate(d.getDate() + 30);
    const newDueDate = d.toISOString().split('T')[0];

    s.dueDate = newDueDate;
    s.status = 'Completed';

    if(!s.payments) s.payments = [];
    
    // RECORD SAVE: Yahan "prevDue" aur "validTill" dono save ho rahe hain
    s.payments.unshift({ 
        amount: amt, 
        date: new Date().toLocaleDateString(), 
        op: op,
        prevDue: oldDue,       // Purani Date
        validTill: newDueDate  // Nayi Date
    });

    db.ref('students/' + currentId).update(s);
    closeModal('payModal');
    
    genPDF(currentId, 0);
}



    // EDIT
    function openEdit(id) {
        currentId = id; const s = students.find(x=>x.id===id);

    function openMsg(id) { currentId = id; document.getElementById('msgModal').style.display='block'; updateMsg(); }
    function updateMsg() {
        const s = students.find(x=>x.id===currentId);
        const t = tpls[document.getElementById('msg-type').value];
        const a = s.payments ? s.payments[0].amount : "0";
        document.getElementById('msg-body').value = t.replace('{name}', s.name).replace('{id}', s.id).replace('{seat}', s.seat).replace('{due}', s.dueDate).replace('{amt}', a);
    }
    function sendMsg(mode) {
        const s = students.find(x=>x.id===currentId);
        const txt = encodeURIComponent(document.getElementById('msg-body').value);
        if(mode==='wa') window.open(`https://wa.me/${s.mobile}?text=${txt}`);
        else window.open(`mailto:${s.email}?subject=Library Alert&body=${txt}`);
    }

    function delS(id) { if(confirm("Delete permanently?")) db.ref('students/'+id).remove(); }
    function search(q, l) {
        const f = q.toLowerCase(); const cards = document.getElementById(l).getElementsByClassName('record-card');
        for (let c of cards) c.style.display = c.innerText.toLowerCase().includes(f) ? "" : "none";
    }
    function updateStats() {
        document.getElementById('stat-total').innerText = students.length;
        document.getElementById('stat-active').innerText = students.filter(s=>s.status==='Completed').length;
    }
