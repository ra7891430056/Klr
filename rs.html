<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>KLR Attendance - Permission Fixed</title>
    <script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; max-width: 600px; margin: auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #preview { width: 100%; border-radius: 8px; background: #000; margin-bottom: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-scan { background: #2563eb; color: white; }
        .btn-add { background: #16a34a; color: white; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>KLR Attendance System</h2>
    
    <div id="reg-form">
        <input type="text" id="stu-name" placeholder="Student Name" style="padding:10px; width:70%">
        <button class="btn btn-add" onclick="addStudent()">Add Student</button>
    </div>

    <div style="margin-top:20px;">
        <button class="btn btn-scan" onclick="startCamera()">1. Click here to Enable Camera</button>
        <video id="preview"></video>
    </div>

    <button class="btn" style="background:#ef4444; color:white" onclick="exportPDF()">Export PDF</button>

    <h3>Student List & Records</h3>
    <table>
        <thead>
            <tr><th>ID</th><th>Name</th><th>QR</th><th>Action</th></tr>
        </thead>
        <tbody id="stu-table"></tbody>
    </table>
</div>

<script>
    let students = JSON.parse(localStorage.getItem('klr_students')) || [];
    let scanner = null;

    // 1. Start Camera and Request Permission
    function startCamera() {
        scanner = new Instascan.Scanner({ video: document.getElementById('preview') });
        
        scanner.addListener('scan', function (content) {
            markAttendance(content);
        });

        Instascan.Camera.getCameras().then(function (cameras) {
            if (cameras.length > 0) {
                // Mobile ke liye hamesha peeche wala camera select karega
                let selectedCam = cameras.length > 1 ? cameras[1] : cameras[0];
                scanner.start(selectedCam).catch(e => alert("Permission Denied: " + e));
            } else {
                alert('No cameras found. Please connect a camera.');
            }
        }).catch(function (e) {
            alert("Camera Error: " + e);
        });
    }

    function addStudent() {
        let name = document.getElementById('stu-name').value;
        if(!name) return alert("Naam likhiye");
        let id = Math.floor(1000 + Math.random() * 9000).toString();
        students.push({id, name});
        localStorage.setItem('klr_students', JSON.stringify(students));
        document.getElementById('stu-name').value = "";
        render();
    }

    function deleteStudent(id) {
        students = students.filter(s => s.id !== id);
        localStorage.setItem('klr_students', JSON.stringify(students));
        render();
    }

    function markAttendance(id) {
        let student = students.find(s => s.id === id);
        if(student) {
            alert("Attendance Marked: " + student.name);
            // Yahan aap attendance log save karne ka code daal sakte hain
        } else {
            alert("Unknown QR Code!");
        }
    }

    function render() {
        let tbody = document.getElementById('stu-table');
        tbody.innerHTML = "";
        students.forEach(s => {
            let row = `<tr>
                <td>${s.id}</td>
                <td>${s.name}</td>
                <td><div id="qr-${s.id}"></div></td>
                <td><button onclick="deleteStudent('${s.id}')">Delete</button></td>
            </tr>`;
            tbody.innerHTML += row;
            setTimeout(() => {
                new QRCode(document.getElementById(`qr-${s.id}`), { text: s.id, width: 50, height: 50 });
            }, 10);
        });
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("KLR Student List", 14, 15);
        doc.autoTable({
            head: [['ID', 'Name']],
            body: students.map(s => [s.id, s.name]),
            startY: 20
        });
        doc.save("Students.pdf");
    }

    render();
</script>
</body>
</html>
